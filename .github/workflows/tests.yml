name: AERO Selftest
on:
  push:
    paths: ['live_bot.py', 'selftest.py', 'requirements.txt']
  workflow_dispatch:
jobs:
  selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python selftest.py
