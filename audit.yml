name: AERO Одит-робот
on:
  schedule:
    - cron: '0 2 * * 1-5'     # 05:00 София — по време на Азия
    - cron: '0 12 * * 1-5'    # 15:00 София — рано сутрин преди Ню Йорк
    - cron: '30 18 * * 1-5'   # 21:30 София — вечер, след равносметката
  workflow_dispatch:
permissions:
  contents: read
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt pyyaml
      - name: run audit robot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python audit_bot.py --repo . --code . --send
      - name: alarm on failure                          # W4: ако роботът падне — кажи го
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="⚠️ AERO Одит-роботът падна — виж Actions (отчетът не излезе)." || true
